<!doctype html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Tracker</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="calendar.css">
</head>

<body class="has-fixed-nav">
  <!--MAIN NAVBAR (or topNavbar), css reference 'top-navbar'-->
  <nav class="navbar navbar-expand-lg navbar-light top-navbar">
    <a class="navbar-brand" href="index.html">Home</a>

    <!--hamburger button that opens all links and collapses both-->
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target=".dual-collapse"
      aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse dual-collapse" id="mainNavbar">
      <div class="navbar-nav">
        <a class="nav-item nav-link active" href="epic1_classCalendar.html">Planner</a>
        <a class="nav-item nav-link active" href="epic6_focusManagement.html">Study Timer</a>
        <a class="nav-item nav-link active" href="epic2_studyTracker.html">Assignment Tracker</a>
        <a class="nav-item nav-link active" href="epic3_stressManagement.html">Stress Management Tips</a>
      </div>

      <div class="navbar-nav ml-auto nav-auth-group">
        <div class="nav-item dropdown">
          <a class="nav-link dropdown-toggle active" href="#" id="aboutDropdown" role="button" data-toggle="dropdown"
            aria-haspopup="true" aria-expanded="false">About</a>
          <div class="dropdown-menu" aria-labelledby="aboutDropdown">
            <a class="dropdown-item" href="team.html">About Us</a>
            <a class="dropdown-item" href="about.html">About the Project</a>
          </div>
        </div>

        <div class="nav-item dropdown profile-dropdown-wrap">
          <a class="nav-link profile-icon active" href="epic4_profile.html" id="profileDropdown"
            title="Profile & Settings">
            <i class="bi bi-person-circle"></i>
            <i class="bi bi-caret-down-fill profile-caret"></i>
          </a>

          <div class="dropdown-menu dropdown-menu-right profile-menu" aria-labelledby="profileDropdown">
            <a class="dropdown-item" href="epic4_profile.html">Profile &amp; Settings</a>
            <div class="dropdown-divider"></div>
            <a class="dropdown-item" href="login.html">Login</a>
            <a class="dropdown-item" href="logout.html">Logout</a>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar_head">
        <div class="sidebar_title">Upcoming Events and Courses</div>
        <div class="sidebar_term" data-term-label>Spring 2026</div>
      </div>
      <div class="sidebar_section">
        <div class="sidebar_section_title">Upcoming Events</div>
        <div class="sidebar_list" id="sidebarUpcoming"></div>
      </div>

      <div class="sidebar_section">
        <div class="sidebar_section_title">Courses</div>
        <div class="sidebar_list" id="sidebarCourses"></div>
      </div>

    </aside>
    <div class="modal fade" id="courseModal" tabindex="-1" role="dialog" aria-labelledby="courseModalLabel"
      aria-hidden="true">
      <div class="modal-dialog" role="document">
        <div class="modal-content">
          <form id="courseEditForm">
            <div class="modal-header">
              <h5 class="modal-title">Course Details</h5>
              <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span
                  aria-hidden="true">&times;</span></button>
            </div>

            <div class="modal-body">
              <input type="hidden" id="modalCourseId">
              <div class="form-group"><label for="modalCourseName">Course Name</label><input type="text"
                  class="form-control" id="modalCourseName" required></div>
              <div class="form-group"><label for="modalCourseTime">Course Time</label><input type="text"
                  class="form-control" id="modalCourseTime"></div>
              <div class="form-group"><label for="modalCourseInstructor">Instructor</label><input type="text"
                  class="form-control" id="modalCourseInstructor"></div>
            </div>

            <div class="modal-footer">
              <button type="button" id="deleteCourseBtn" class="btn btn-danger">Delete</button>
              <button type="submit" class="btn btn-primary">Save Changes</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <main class="content">
      <section class="panel form-panel">
        <div class="panel_head">
          <h2 class="panel_title" style="font-size: 22px; margin: 0;">Add Event</h2>
          <a class="btn small" href="epic1_classCalendar.html">Back to Calendar</a>
        </div>

        <form id="eventForm">
          <div class="form-grid">
            <div>
              <label for="title">Title</label>
              <input id="title" class="input" name="title" required placeholder="e.g., Study Session">
            </div>

            <div>
              <label for="categorySelect">Category</label>
              <select name="category" id="categorySelect" class="select">
                <option value="study">Study</option>
                <option value="assignment">Assignment</option>
                <option value="wellness">Wellness</option>
                <option value="other" selected>Other</option>
              </select>
            </div>

            <div>
              <label for="start_date">Date</label>
              <input id="start_date" class="input" type="date" name="start_date" required>
            </div>

            <div>
              <label for="start_time">Start Time</label>
              <input id="start_time" class="input" type="time" name="start_time">
            </div>

            <div>
              <label for="duration">Hours</label>
              <input id="duration" class="input" type="number" name="duration" step="1" min="1" placeholder="e.g. 2">
            </div>
          </div>

          <div style="margin-top: 14px;">
            <label for="description">Description (optional)</label>
            <textarea id="description" class="textarea" name="description" rows="4"
              placeholder="Notes, details, locations, links, etc."></textarea>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-green">Save</button>
            <a class="btn" href="epic1_classCalendar.html">Cancel</a>
          </div>

        </form>
      </section>
    </main>
  </div>

  <script>
    const dateInput = document.getElementById('start_date');

    if (!dateInput.value) {
      const today = new Date().toISOString().split('T')[0];
      dateInput.value = today;
    }
  </script>

  <script src="storage.js"></script>
  <script src="add-event.js"></script>
</body>

</html>
