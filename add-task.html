    <div class="app_body">

        <div class="modal fade" id="courseModal" tabindex="-1" role="dialog" aria-labelledby="courseModalLabel"
            aria-hidden="true">
            <div class="modal-dialog" role="document">
                <div class="modal-content">
                    <form id="courseEditForm">
                        <div class="modal-header">
                            <h5 class="modal-title">Course Details</h5>
                            <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span
                                    aria-hidden="true">&times;</span></button>
                        </div>

                        <div class="modal-body">
                            <input type="hidden" id="modalCourseId">
                            <div class="form-group"><label for="modalCourseName">Course Name</label><input type="text"
                                    class="form-control" id="modalCourseName" required></div>
                            <div class="form-group"><label for="modalCourseTime">Course Time</label><input type="text"
                                    class="form-control" id="modalCourseTime"></div>
                            <div class="form-group"><label for="modalCourseInstructor">Instructor</label><input
                                    type="text" class="form-control" id="modalCourseInstructor"></div>
                        </div>

                        <div class="modal-footer">
                            <button type="button" id="deleteCourseBtn" class="btn btn-danger">Delete</button>
                            <button type="submit" class="btn btn-primary">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <section class="content">
            <h2 class="content_title">Add a New Task</h2>

            <form id="taskForm" style="max-width: 520px;">
                <div class="form-group">
                    <label for="taskTitle"><strong>Task Title:</strong></label>
                    <input type="text" id="taskTitle" class="form-control" required />
                </div>

                <div class="form-group">
                    <label for="className"><strong>Class Name:</strong></label>
                    <input type="text" id="className" class="form-control" required />
                </div>

                <div class="task-actions">
                    <button class="btn btn-green" type="submit">Add Task</button>
                    <button class="btn" type="button" id="cancelBtn">Cancel</button>
                </div>
            </form>

            <script>
                const form = document.getElementById("taskForm");
                const cancelBtn = document.getElementById("cancelBtn");

                form.addEventListener("submit", function (e) {
                    e.preventDefault();

                    const title = document.getElementById("taskTitle").value.trim();
                    const className = document.getElementById("className").value.trim();

                    if (!title || !className) {
                        return;
                    }

                    const newTask = {
                        title: title,
                        className: className,
                        completed: false
                    };

                    const tasks = JSON.parse(localStorage.getItem("tasks")) || [];
                    tasks.push(newTask);
                    localStorage.setItem("tasks", JSON.stringify(tasks));

                    form.reset();
                    window.location.href = "epic6_focusManagement.html";
                });

                cancelBtn.addEventListener("click", function () {
                    window.location.href = "epic6_focusManagement.html";
                });
            </script>

            <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
        </section>
